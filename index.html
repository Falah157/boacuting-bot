<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F609 V6 FIXED | SMC ENGINE</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {margin:0;background:#0a0a0f;color:#00ffcc;font-family:monospace;padding:12px;}
button{cursor:pointer}
.container{max-width:900px;margin:auto}
.box{background:#111a24;border:1px solid #00ffcc;border-radius:12px;padding:10px;margin:10px 0}
.row{display:flex;gap:10px;flex-wrap:wrap}
.item{flex:1;background:#0f1622;padding:8px;border-radius:10px;text-align:center}
.green{color:#00ffcc}
.red{color:#ff3366}
.yellow{color:#ffd700}
.price{font-size:28px}
</style>
</head>

<body>

<div class="container">

<h2>⚡ V6 FIXED SMC ENGINE</h2>

<div class="box">
Price: <div id="price" class="price">---</div>
Change: <span id="change">---</span>
</div>

<div class="box">
Signal: <div id="signal">Loading...</div>
</div>

<div class="box row">
<div class="item">ATR <div id="atr">--</div></div>
<div class="item">BOS <div id="bos">--</div></div>
<div class="item">Structure <div id="structure">--</div></div>
</div>

<div class="box">
<button onclick="runBacktest()">BACKTEST</button>
<div id="backtest"></div>
</div>

</div>

<script>
// ================= STATE =================
let symbol="BTCUSD";
let candles=[];
let price=0;

// ================= FETCH CANDLES (FIXED) =================
async function fetchCandles(){
    try{
        let binanceSymbol="BTCUSDT"; // FIX: always correct
        let url=`https://api.binance.com/api/v3/klines?symbol=${binanceSymbol}&interval=15m&limit=120`;

        let res=await fetch(url);
        let data=await res.json();

        candles=data.map(c=>({
            open:+c[1],
            high:+c[2],
            low:+c[3],
            close:+c[4]
        }));

        price=candles[candles.length-1].close;

        document.getElementById("price").innerHTML=price.toFixed(2);

    }catch(e){
        console.log(e);
    }
}

// ================= ATR (FIXED TRUE RANGE) =================
function ATR(){
    if(candles.length<15) return 100;

    let tr=[];
    for(let i=1;i<candles.length;i++){
        let h=candles[i].high;
        let l=candles[i].low;
        let pc=candles[i-1].close;

        tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
    }

    return tr.slice(-14).reduce((a,b)=>a+b,0)/14;
}

// ================= BOS =================
function BOS(){
    if(candles.length<10) return "NONE";

    let last=candles[candles.length-1];
    let highs=candles.slice(-10).map(c=>c.high);
    let lows=candles.slice(-10).map(c=>c.low);

    let maxH=Math.max(...highs);
    let minL=Math.min(...lows);

    if(last.close>maxH) return "BOS_UP";
    if(last.close<minL) return "BOS_DOWN";
    return "RANGE";
}

// ================= SIGNAL =================
function signal(){
    let atr=ATR();
    let bos=BOS();

    document.getElementById("atr").innerHTML=atr.toFixed(2);
    document.getElementById("bos").innerHTML=bos;

    let type="NEUTRAL";
    let color="yellow";

    if(bos==="BOS_UP"){
        type="BUY"; color="green";
    }
    if(bos==="BOS_DOWN"){
        type="SELL"; color="red";
    }

    document.getElementById("signal").innerHTML=`<span class="${color}">${type}</span>`;

    return {type,atr};
}

// ================= BACKTEST (FIXED LOOP) =================
function runBacktest(){
    let wins=0,loss=0;

    if(candles.length<50){
        document.getElementById("backtest").innerHTML="Need more data";
        return;
    }

    for(let i=20;i<candles.length-1;i++){ // FIXED
        let slice=candles.slice(0,i);
        let testLast=slice[slice.length-1];
        let next=candles[i+1];

        let highs=slice.slice(-10).map(c=>c.high);
        let lows=slice.slice(-10).map(c=>c.low);

        let maxH=Math.max(...highs);
        let minL=Math.min(...lows);

        if(testLast.close>maxH && next.close>testLast.close) wins++;
        else if(testLast.close<minL && next.close<testLast.close) wins++;
        else loss++;
    }

    let total=wins+loss;
    let winrate=(wins/total*100).toFixed(1);

    document.getElementById("backtest").innerHTML=`
    Wins: ${wins}<br>
    Loss: ${loss}<br>
    Winrate: ${winrate}%
    `;
}

// ================= LOOP =================
async function start(){
    await fetchCandles();
    signal();
    setInterval(async()=>{
        await fetchCandles();
        signal();
    },8000);
}

start();
</script>

</body>
</html>
