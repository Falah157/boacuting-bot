<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>BOA CUTING TRADING</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e17; font-family: -apple-system, sans-serif; padding: 12px; color: #eef5ff; }
        .container { max-width: 100%; margin: 0 auto; }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0e17, #05080f); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111a24; border-radius: 32px; padding: 40px 24px; text-align: center; border: 1px solid #00ffcc; max-width: 320px; }
        .login-title { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #00ffcc, #ffd700); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-sub { font-size: 12px; color: #8a9bb0; margin: 15px 0; }
        .start-btn { background: #00ffcc20; border: 1px solid #00ffcc; padding: 14px 24px; border-radius: 40px; cursor: pointer; font-size: 16px; font-weight: bold; color: #00ffcc; width: 100%; }
        .main-app { display: none; }
        .main-app.show { display: block; }
        .user-card { background: linear-gradient(135deg, #0f1622, #0a0e17); border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #00ffcc; margin-bottom: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #00ffcc, #ffd700); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .user-info { flex: 1; }
        .user-name { font-size: 16px; font-weight: 800; }
        .symbol-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .sym-btn { flex: 1; background: #111a24; padding: 12px; border-radius: 40px; text-align: center; cursor: pointer; border: 1px solid #00ffcc; }
        .sym-btn.active { background: #00ffcc20; border-color: #00ffcc; color: #00ffcc; }
        .price-card { background: #111a24; border-radius: 20px; padding: 12px; text-align: center; margin-bottom: 12px; border: 1px solid #00ffcc; }
        .price { font-size: 32px; font-weight: 800; font-family: monospace; }
        .chart { height: 220px; border-radius: 16px; overflow: hidden; margin-bottom: 12px; border: 1px solid #00ffcc; background: #131b24; }
        .signal-box { background: linear-gradient(135deg, #0f1622, #0a0e17); border-radius: 24px; padding: 16px; text-align: center; margin-bottom: 12px; border: 2px solid; cursor: pointer; }
        .signal-dir { font-size: 44px; font-weight: 800; margin: 8px 0; }
        .trade-buttons { display: flex; gap: 8px; margin-bottom: 12px; }
        .buy-btn, .sell-btn, .close-btn { flex: 1; padding: 12px; border-radius: 40px; text-align: center; cursor: pointer; font-weight: 800; }
        .buy-btn { background: #00ffcc10; border: 2px solid #00ffcc; color: #00ffcc; }
        .sell-btn { background: #ff336610; border: 2px solid #ff3366; color: #ff3366; }
        .close-btn { background: #ffd70010; border: 2px solid #ffd700; color: #ffd700; }
        .trade-panel { background: #111a24; border-radius: 16px; padding: 10px; margin-bottom: 12px; }
        .trade-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 11px; }
        .footer { text-align: center; font-size: 8px; color: #8a9bb0; margin-top: 10px; }
        .green { color: #00ffcc; }
        .red { color: #ff3366; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="login-title">🚀 BOA CUTING TRADING</div>
        <div class="login-sub">Real signals | Voice alerts | Free</div>
        <button class="start-btn" onclick="startTrading()">🔊 START TRADING</button>
    </div>
</div>

<div id="mainApp" class="main-app">
<div class="container">
    <div class="user-card">
        <div class="avatar" id="userAvatar">📊</div>
        <div class="user-info">
            <div class="user-name" id="userName">Trader</div>
        </div>
    </div>
    
    <div class="symbol-row">
        <div class="sym-btn active" data-sym="XAUUSD">🥇 XAUUSD</div>
        <div class="sym-btn" data-sym="BTCUSD">₿ BTCUSD</div>
    </div>
    
    <div class="price-card">
        <div class="price" id="price">$---</div>
    </div>
    
    <div class="chart" id="chart"></div>
    
    <div class="signal-box" id="signalBox">
        <div class="signal-dir" id="signalDir">🟡 WAITING</div>
    </div>
    
    <div class="trade-buttons">
        <div class="buy-btn" id="buyBtn">🔺 BUY</div>
        <div class="sell-btn" id="sellBtn">🔻 SELL</div>
        <div class="close-btn" id="closeBtn">⏸️ CLOSE</div>
    </div>
    
    <div class="trade-panel">
        <div class="trade-row"><span>📊 MY TRADE</span><span id="tradeStatus">None</span></div>
        <div id="tradeDetails"></div>
    </div>
    
    <div class="footer">🎯 15-MINUTE SIGNALS | @BOACUTING_bot</div>
</div>
</div>

<script>
    let symbol = "XAUUSD";
    let price = null;
    let prevPrice = null;
    let history = [];
    let trade = null;
    let chart = null;
    let currentUser = null;
    
    const config = { 
        XAUUSD: { sl: 15, tp: 30, fmt: 2, mult: 1, name: "Gold", apiUrl: "https://api.coingecko.com/api/v3/simple/price?ids=tether-gold&vs_currencies=usd", priceKey: "tether-gold" },
        BTCUSD: { sl: 800, tp: 1500, fmt: 0, mult: 100, name: "Bitcoin", apiUrl: "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd", priceKey: "bitcoin" }
    };
    
    function speak(message) {
        if (!window.speechSynthesis) return;
        try {
            window.speechSynthesis.cancel();
            let utterance = new SpeechSynthesisUtterance(message);
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        } catch(e) {}
    }
    
    function startTrading() {
        currentUser = { name: "Trader" };
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainApp").classList.add("show");
        document.getElementById("userName").innerHTML = "Trader";
        document.getElementById("userAvatar").innerHTML = "📊";
        speak("Welcome to BOA CUTING Trading");
        initChart();
        startUpdates();
    }
    
    async function fetchPrice() {
        try {
            let c = config[symbol];
            let res = await fetch(c.apiUrl);
            let data = await res.json();
            if (data && data[c.priceKey]) {
                let newPrice = data[c.priceKey].usd;
                prevPrice = price;
                price = newPrice;
                history.push(price);
                if (history.length > 200) history.shift();
                let fmt = c.fmt;
                document.getElementById("price").innerHTML = `$${price.toFixed(fmt)}`;
                return true;
            }
        } catch(e) {}
        return false;
    }
    
    function rsi() {
        if (history.length < 15) return 50;
        let gain = 0, loss = 0;
        for (let i = history.length - 14; i < history.length; i++) {
            let diff = history[i] - history[i-1];
            if (diff > 0) gain += diff;
            else loss -= diff;
        }
        let avgGain = gain / 14, avgLoss = loss / 14;
        if (avgLoss === 0) return 100;
        return Math.round(100 - (100 / (1 + (avgGain / avgLoss))));
    }
    
    function ema(period) {
        if (history.length < period) return price || 0;
        let k = 2 / (period + 1);
        let val = history[0];
        for (let i = 1; i < history.length; i++) {
            val = history[i] * k + val * (1 - k);
        }
        return val;
    }
    
    function getSignal() {
        if (!price || history.length < 20) return { dir: "🟡 WAITING", color: "#ffd700", type: "WAIT" };
        let e9 = ema(9);
        let e21 = ema(21);
        let r = rsi();
        if (e9 > e21 && r < 65) return { dir: "🟢 BUY", color: "#00ffcc", type: "BUY" };
        if (e9 < e21 && r > 35) return { dir: "🔴 SELL", color: "#ff3366", type: "SELL" };
        if (r < 35) return { dir: "🟢 BUY", color: "#00ffcc", type: "BUY" };
        if (r > 65) return { dir: "🔴 SELL", color: "#ff3366", type: "SELL" };
        return { dir: "🟡 WAIT", color: "#ffd700", type: "WAIT" };
    }
    
    function updateSignal() {
        let sig = getSignal();
        document.getElementById("signalDir").innerHTML = sig.dir;
        document.getElementById("signalDir").style.color = sig.color;
        document.getElementById("signalBox").style.borderColor = sig.color;
        return sig;
    }
    
    function openTrade(type) {
        if (trade) { alert("Close existing trade first"); return; }
        let sig = getSignal();
        if (type !== sig.type && sig.type !== "WAIT") {
            alert(`Signal is ${sig.type}, not ${type}`);
            return;
        }
        let c = config[symbol];
        let sl = type === "BUY" ? price - (c.sl * c.mult) : price + (c.sl * c.mult);
        let tp = type === "BUY" ? price + (c.tp * c.mult) : price - (c.tp * c.mult);
        trade = { type, entry: price, sl, tp };
        speak(`${type} trade opened`);
        updateTradeDisplay();
    }
    
    function closeTrade() {
        if (!trade) { alert("No trade open"); return; }
        let c = config[symbol];
        let pnl = trade.type === "BUY" ? price - trade.entry : trade.entry - price;
        let pips = c.mult === 1 ? pnl * 100 : pnl;
        speak(`Trade closed. ${pips >= 0 ? 'Profit' : 'Loss'} ${Math.abs(pips).toFixed(1)} pips`);
        trade = null;
        updateTradeDisplay();
    }
    
    function updateTradeDisplay() {
        if (trade) {
            let c = config[symbol];
            let pnl = trade.type === "BUY" ? price - trade.entry : trade.entry - price;
            let pips = c.mult === 1 ? pnl * 100 : pnl;
            let fmt = c.fmt;
            document.getElementById("tradeStatus").innerHTML = `${trade.type} OPEN`;
            document.getElementById("tradeDetails").innerHTML = `
                <div class="trade-row"><span>Entry:</span><span class="green">$${trade.entry.toFixed(fmt)}</span></div>
                <div class="trade-row"><span>Now:</span><span>$${price.toFixed(fmt)}</span></div>
                <div class="trade-row"><span>PnL:</span><span class="${pips >= 0 ? 'green' : 'red'}">${pips >= 0 ? '+' : ''}${pips.toFixed(1)} pips</span></div>
            `;
            if (trade.type === "BUY") {
                if (price >= trade.tp) { speak("Take profit!"); closeTrade(); }
                else if (price <= trade.sl) { speak("Stop loss!"); closeTrade(); }
            } else {
                if (price <= trade.tp) { speak("Take profit!"); closeTrade(); }
                else if (price >= trade.sl) { speak("Stop loss!"); closeTrade(); }
            }
        } else {
            document.getElementById("tradeStatus").innerHTML = "None";
            document.getElementById("tradeDetails").innerHTML = "";
        }
    }
    
    function initChart() {
        if (chart) try { chart.remove(); } catch(e) {}
        let tvSym = symbol === "XAUUSD" ? "FX_IDC:XAUUSD" : "BINANCE:BTCUSDT";
        chart = new TradingView.widget({
            container_id: "chart", width: "100%", height: 220,
            symbol: tvSym, interval: "15", theme: "dark", style: "1",
            locale: "en", toolbar_bg: "#000", studies: []
        });
    }
    
    async function updateAll() {
        await fetchPrice();
        updateSignal();
        updateTradeDisplay();
    }
    
    function startUpdates() {
        updateAll();
        setInterval(updateAll, 3000);
    }
    
    document.getElementById("buyBtn").onclick = () => openTrade("BUY");
    document.getElementById("sellBtn").onclick = () => openTrade("SELL");
    document.getElementById("closeBtn").onclick = () => closeTrade();
    
    document.querySelectorAll(".sym-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".sym-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            symbol = btn.getAttribute("data-sym");
            price = null; history = []; trade = null;
            initChart();
            updateAll();
        };
    });
</script>
</body>
</html>
