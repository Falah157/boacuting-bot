<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pro Fibonacci Chart — XAUUSD / BTCUSD</title>
  <style>
    :root {
      --bg: #050a12;
      --panel: rgba(11,16,32,0.85);
      --muted: #8f9bb5;
      --accent: #7c9eff;
      --good: #00e096;
      --bad: #ff5e7e;
      --fib: rgba(255,221,153,0.07);
    }
    html,body { height:100%; margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:var(--bg); color:#eef2ff; }
    #app { height:100%; display:flex; align-items:stretch; justify-content:center; padding:8px; }
    .chart-wrap {
      width:100%; max-width:1600px; height:calc(100vh - 16px); background:linear-gradient(180deg,#061018 0%, #071322 100%); border-radius:12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position:relative; overflow:hidden;
      border: 1px solid rgba(40,48,70,0.6);
    }
    canvas { display:block; width:100%; height:100%; }
    .controls {
      position:absolute; top:12px; left:12px; display:flex; gap:8px; z-index:30; align-items:center;
    }
    .btn {
      background:#0e1726; border:1px solid rgba(255,255,255,0.03); color:#dfe8ff; padding:8px 12px; border-radius:10px; cursor:pointer; font-weight:600; font-size:13px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }
    .btn.active { background: linear-gradient(90deg,#25324f,#2f446f); border-color:var(--accent); box-shadow:0 6px 18px rgba(124,158,255,0.08); }
    .tf-group { display:flex; gap:6px; }
    .symbol-group { display:flex; gap:6px; }
    .status {
      position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.25); padding:8px 12px; border-radius:10px; font-size:13px; color:#cfe3ff; z-index:30;
      border:1px solid rgba(255,255,255,0.03);
    }
    .legend {
      position:absolute; left:12px; bottom:12px; background:rgba(0,0,0,0.18); padding:10px 12px; border-radius:10px; z-index:30; font-size:13px; color:#e6eefc;
      border:1px solid rgba(255,255,255,0.03);
    }
    .small { font-size:12px; color:var(--muted); display:inline-block; margin-left:8px; }
    .label-pill { background:rgba(255,255,255,0.03); padding:6px 8px; border-radius:8px; margin-left:8px; font-weight:700; font-family:monospace; color:#fff; }
    .overlay-note { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); color:rgba(255,255,255,0.03); font-size:42px; pointer-events:none; z-index:5; display:none; }
    @media (max-width:700px) {
      .controls { top:8px; left:8px; flex-wrap:wrap; gap:6px; }
      .status { top:8px; right:8px; font-size:12px; padding:6px 8px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="chart-wrap" id="chartWrap" aria-label="Fibonacci trading chart area">
      <canvas id="chartCanvas" role="img" aria-label="Price chart"></canvas>

      <div class="controls" id="controls">
        <div class="symbol-group" role="group" aria-label="Symbols">
          <button class="btn active" data-symbol="XAUUSD" id="symXAU">XAUUSD</button>
          <button class="btn" data-symbol="BTCUSD" id="symBTC">BTCUSD</button>
        </div>

        <div class="tf-group" role="group" aria-label="Timeframes">
          <button class="btn" data-tf="5">M5</button>
          <button class="btn active" data-tf="15">M15</button>
          <button class="btn" data-tf="30">M30</button>
          <button class="btn" data-tf="60">H1</button>
          <button class="btn" data-tf="240">H4</button>
          <button class="btn" data-tf="1440">D1</button>
        </div>

        <button class="btn" id="refreshBtn" title="Force refresh">⟳</button>
      </div>

      <div class="status" id="statusBox">
        <div>Symbol: <span id="statusSymbol">XAUUSD</span> <span class="label-pill" id="statusPrice">—</span></div>
        <div style="margin-top:6px;">TF: <span id="statusTF">M15</span> <span class="small" id="liveState">(live)</span></div>
      </div>

      <div class="legend" id="legend">
        <div>Legend: <span style="color:var(--good)">▉</span> Bull TP &nbsp; <span style="color:var(--bad)">▉</span> Bear SL &nbsp; <span style="color:#ffdd99">→</span> Projection</div>
      </div>

      <div class="overlay-note" id="overlayNote">LOADING…</div>
    </div>
  </div>

<script>
/*
  Pro Fibonacci Chart
  - BTC candles: Binance klines (real OHLC)
  - XAU: attempt multiple endpoints for current price / history; fallback to synthetic seeded candles
  - Single large canvas, devicePixelRatio-aware
  - Detect swing high/low and draw Fib lines, entry (current price), stop loss, TP lines, projection
  - Controls: symbol and timeframe (minutes). Timeframes map to intervals used when fetching (or aggregating) data.
*/

// ========== CONFIG ==========
const canvas = document.getElementById('chartCanvas');
const ctx = canvas.getContext('2d');
const chartWrap = document.getElementById('chartWrap');
const overlayNote = document.getElementById('overlayNote');

const btnSymXAU = document.getElementById('symXAU');
const btnSymBTC = document.getElementById('symBTC');
const tfButtons = Array.from(document.querySelectorAll('.tf-group .btn'));
const statusPrice = document.getElementById('statusPrice');
const statusTF = document.getElementById('statusTF');
const statusSymbol = document.getElementById('statusSymbol');
const liveState = document.getElementById('liveState');
const refreshBtn = document.getElementById('refreshBtn');

let symbol = 'XAUUSD';      // 'XAUUSD' or 'BTCUSD'
let timeframe = 15;        // minutes (5,15,30,60,240,1440)
let candles = [];          // array of {t,o,h,l,c,v} time in ms
let deviceDPR = window.devicePixelRatio || 1;
let priceNow = 0;
let usingLiveXAU = false;
let usingLiveHistory = false;

// mapping minutes -> Binance interval strings
const BINANCE_INTERVALS = {
  1: '1m', 3: '3m', 5: '5m', 15: '15m', 30: '30m', 60: '1h', 120: '2h', 240: '4h', 360: '6h', 720: '12h', 1440: '1d'
};

// utility: format number
function fmt(v, dp=2) { return Number(v).toLocaleString(undefined, {minimumFractionDigits: dp, maximumFractionDigits: dp}); }

// ========== RESIZE & DPR ==========
function resizeCanvas() {
  const rect = chartWrap.getBoundingClientRect();
  const w = Math.max(200, rect.width);
  const h = Math.max(200, rect.height);
  deviceDPR = window.devicePixelRatio || 1;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = Math.floor(w * deviceDPR);
  canvas.height = Math.floor(h * deviceDPR);
  ctx.setTransform(deviceDPR,0,0,deviceDPR,0,0);
  draw();
}
window.addEventListener('resize', resizeCanvas);

// ========== DATA FETCHING ==========
async function fetchBTCklines(intervalStr, limit=500) {
  // Binance public klines for BTCUSDT
  const url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${intervalStr}&limit=${limit}`;
  const resp = await fetch(url, {cache:'no-store'});
  if (!resp.ok) throw new Error(`Binance fetch failed: ${resp.status}`);
  const arr = await resp.json();
  // arr elements: [ openTime, open, high, low, close, volume, closeTime, ... ]
  return arr.map(a => ({ t: a[0], o: parseFloat(a[1]), h: parseFloat(a[2]), l: parseFloat(a[3]), c: parseFloat(a[4]), v: parseFloat(a[5]) }));
}

// Try multiple sources for XAU current price (USD per ounce)
async function fetchXAUcurrent() {
  // 1) data-asg.goldprice.org (commonly used) — may include items and historic data
  try {
    const url = 'https://data-asg.goldprice.org/dbXRates/USD';
    const r = await fetch(url, {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      // j.items may include "xauPrice" or items[0].xauPrice?
      if (j && j.items && j.items[0] && (j.items[0].xauPrice || j.items[0].price)) {
        const p = parseFloat(j.items[0].xauPrice || j.items[0].price);
        if (!isNaN(p)) return { price: p, source: 'data-asg.goldprice.org', history: j.items };
      }
      // or j.items[x].price_usd
      if (j && j.items && j.items[0] && j.items[0].price_usd) {
        const p = parseFloat(j.items[0].price_usd);
        if (!isNaN(p)) return { price: p, source: 'data-asg.goldprice.org', history: j.items };
      }
    }
  } catch (e) {
    console.warn('goldprice org failed', e && e.message);
  }

  // 2) exchangerate.host convert (XAU -> USD)
  try {
    const url = 'https://api.exchangerate.host/convert?from=XAU&to=USD';
    const r = await fetch(url, {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      if (j && typeof j.result === 'number') return { price: j.result, source: 'exchangerate.host' };
    }
  } catch (e) {
    console.warn('exchangerate.host failed', e && e.message);
  }

  // 3) try metals.live (may be blocked by CORS)
  try {
    const url = 'https://api.metals.live/v1/spot/gold';
    const r = await fetch(url, {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      if (Array.isArray(j) && j[0] && j[0].price) return { price: parseFloat(j[0].price), source: 'metals.live' };
      if (j && j.price) return { price: parseFloat(j.price), source: 'metals.live' };
    }
  } catch (e) {
    console.warn('metals.live failed (likely CORS)', e && e.message);
  }

  // no success
  return null;
}

// Attempt to fetch historical XAU; if not possible, return null so caller fallbacks to synthetic history
async function fetchXAUhistoryDaily(days=180) {
  // exchangerate.host timeseries supports dates but granularity is daily only; we can use daily as long timeframe selected is D1/H4
  try {
    const end = new Date();
    const start = new Date(end.getTime() - days * 86400000);
    const url = `https://api.exchangerate.host/timeseries?start_date=${start.toISOString().slice(0,10)}&end_date=${end.toISOString().slice(0,10)}&base=XAU&symbols=USD`;
    const r = await fetch(url, {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      if (j && j.rates) {
        // convert to array of daily candles (o/h/l/c where all same because only daily)
        const arr = Object.keys(j.rates).sort().map(d => {
          const price = j.rates[d].USD;
          const t = new Date(d + 'T00:00:00Z').getTime();
          return { t, o: price, h: price, l: price, c: price, v: 0 };
        });
        return arr;
      }
    }
  } catch (e) {
    console.warn('XAU timeseries failed', e && e.message);
  }
  return null;
}

// Build synthetic candles (random walk) anchored to current price for the chosen timeframe and number of bars
function buildSyntheticCandles(anchorPrice, minutesPerBar, bars=300) {
  const out = [];
  let tNow = Date.now();
  const msPerBar = minutesPerBar * 60 * 1000;
  // start in the past
  let timeStart = tNow - (bars - 1) * msPerBar;
  let p = anchorPrice;
  for (let i = 0; i < bars; i++) {
    // make small moves; scale move by timeframe (larger TF -> potentially larger moves)
    const volScale = Math.max(0.0005, minutesPerBar / 1440); // small scale
    const change = (Math.random() - 0.5) * (p * volScale * (0.05 + Math.random()*0.95));
    const o = p;
    p = Math.max(0.0001, p + change);
    // create h/l by adding some intrabar noise
    const hi = Math.max(o, p) * (1 + Math.random() * 0.002 * (1 + minutesPerBar/60));
    const lo = Math.min(o, p) * (1 - Math.random() * 0.002 * (1 + minutesPerBar/60));
    const c = p;
    const v = 1000 + Math.random() * 50000;
    out.push({ t: timeStart, o, h: hi, l: lo, c, v });
    timeStart += msPerBar;
  }
  return out;
}

// ========== AGGREGATION helpers ==========
function aggregateToTF(ticks, minutes) {
  // ticks: array of {t, price, v} or candles; this will produce candles of timeframe 'minutes'
  // If input looks like candles (has o,h,l,c) and timeframe matches, just return last N
  if (!Array.isArray(ticks) || ticks.length === 0) return [];
  if (ticks[0].o !== undefined && ticks[0].h !== undefined) {
    // these are candles already - if their timeframe is different we can't re-aggregate reliably; assume they match
    return ticks.slice(-400);
  }
  // otherwise ticks are price points {t, price, v}
  const ms = minutes * 60 * 1000;
  const res = [];
  let bucketStart = Math.floor(ticks[0].t / ms) * ms;
  let o = ticks[0].price, h = ticks[0].price, l = ticks[0].price, c = ticks[0].price, v = ticks[0].v || 0;
  for (let i=1;i<ticks.length;i++) {
    const tk = ticks[i];
    const b = Math.floor(tk.t / ms) * ms;
    if (b !== bucketStart) {
      res.push({ t: bucketStart, o, h, l, c, v });
      bucketStart = b;
      o = tk.price; h = tk.price; l = tk.price; c = tk.price; v = tk.v || 0;
    } else {
      h = Math.max(h, tk.price);
      l = Math.min(l, tk.price);
      c = tk.price;
      v += tk.v || 0;
    }
  }
  res.push({ t: bucketStart, o, h, l, c, v });
  return res.slice(-400);
}

// ========== SWING DETECTION & FIB ==========
// detect swing high/low in a visible window: use last N bars
function detectSwing(candlesArr) {
  if (!candlesArr || candlesArr.length < 12) return null;
  const lookback = Math.min(60, Math.floor(candlesArr.length / 3));
  let high = -Infinity, low = Infinity, hiIdx = 0, loIdx = 0;
  for (let i = candlesArr.length - lookback; i < candlesArr.length; i++) {
    const c = candlesArr[i];
    if (c.h > high) { high = c.h; hiIdx = i; }
    if (c.l < low) { low = c.l; loIdx = i; }
  }
  return { high: { idx: hiIdx, price: high }, low: { idx: loIdx, price: low } };
}

function computeFibLevels(highPrice, lowPrice, isUptrend) {
  const diff = highPrice - lowPrice;
  if (!isFinite(diff) || diff === 0) return [];
  const ratios = [0.236, 0.382, 0.5, 0.618, 0.786];
  return ratios.map(r => {
    const price = isUptrend ? highPrice - diff * r : lowPrice + diff * r;
    return { r, price };
  });
}

// ========== DRAW ==========
function drawGrid(ctx, w, h) {
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  const rows = 8;
  for (let i=0;i<=rows;i++) {
    const y = 30 + (h - 70) * (i / rows);
    ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(w - 20, y); ctx.stroke();
  }
  ctx.restore();
}

function drawCandles(ctx, arr, viewStartIdx, viewCount, w, h) {
  // arr: candles
  const visible = arr.slice(Math.max(0, arr.length - viewCount), arr.length);
  const len = visible.length;
  if (len === 0) return;
  const spacing = (w - 120) / Math.max(1, len - 1);
  const maxP = Math.max(...visible.map(c => c.h));
  const minP = Math.min(...visible.map(c => c.l));
  const pad = (maxP - minP) * 0.08 || maxP*0.02 || 1;
  const pMax = maxP + pad, pMin = minP - pad;
  const getX = i => 60 + i * spacing;
  const getY = p => 35 + (h - 75) * (1 - (p - pMin) / (pMax - pMin));

  // draw candle wicks and bodies
  for (let i=0;i<len;i++) {
    const c = visible[i];
    const x = getX(i);
    const yOpen = getY(c.o), yHigh = getY(c.h), yLow = getY(c.l), yClose = getY(c.c);
    // wick
    ctx.beginPath();
    ctx.strokeStyle = "rgba(200,200,255,0.35)";
    ctx.lineWidth = 1;
    ctx.moveTo(x, yHigh); ctx.lineTo(x, yLow); ctx.stroke();
    // body
    const bodyTop = Math.min(yOpen, yClose), bodyBottom = Math.max(yOpen, yClose);
    const bodyH = Math.max(1, bodyBottom - bodyTop);
    const bodyW = Math.max(6, spacing * 0.6);
    if (c.c >= c.o) {
      // green
      ctx.fillStyle = "#00e096";
      ctx.fillRect(x - bodyW/2, bodyTop, bodyW, bodyH);
    } else {
      ctx.fillStyle = "#ff5e7e";
      ctx.fillRect(x - bodyW/2, bodyTop, bodyW, bodyH);
    }
  }

  return { getX, getY, pMin, pMax, visible };
}

function drawAnnotations(ctx, meta, w, h) {
  // meta contains: visible candles, getX, getY, pMin,pMax, swing, fib levels, entries...
  if (!meta) return;
  const { getX, getY, visible, pMin, pMax, swing, fibs, projTargets } = meta;

  ctx.save();
  ctx.font = '12px monospace';
  // draw fib lines
  if (fibs && fibs.length) {
    fibs.forEach((f, idx) => {
      const y = getY(f.price);
      ctx.beginPath();
      ctx.strokeStyle = `rgba(${[240,220,150][idx%3]}, ${200}, ${140}, 0.9)`.replace(' undefined','');
      ctx.setLineDash([6,6]); ctx.lineWidth = 1;
      ctx.moveTo(40, y); ctx.lineTo(w - 20, y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ffdd99';
      ctx.fillText(`${(f.r*100).toFixed(1)}% ${fmt(f.price,2)}`, w - 140, y - 6);
    });
  }

  // draw swing markers
  if (swing && swing.high) {
    const idx = swing.high.idx - (candles.length - meta.visible.length);
    if (idx >= 0 && idx < visible.length) {
      const x = getX(idx), y = getY(swing.high.price);
      ctx.beginPath(); ctx.fillStyle = '#ff5e7e'; ctx.arc(x, y, 6, 0, 2*Math.PI); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.fillText('H', x-4, y+4);
    }
  }
  if (swing && swing.low) {
    const idx = swing.low.idx - (candles.length - meta.visible.length);
    if (idx >= 0 && idx < visible.length) {
      const x = getX(idx), y = getY(swing.low.price);
      ctx.beginPath(); ctx.fillStyle = '#00e096'; ctx.arc(x, y, 6, 0, 2*Math.PI); ctx.fill();
      ctx.fillStyle = '#000'; ctx.fillText('L', x-4, y+4);
    }
  }

  // entry/current price line
  if (typeof priceNow === 'number' && isFinite(priceNow)) {
    const yCurr = getY(priceNow);
    ctx.beginPath();
    ctx.strokeStyle = '#ffffaa'; ctx.setLineDash([4,6]); ctx.lineWidth = 1;
    ctx.moveTo(0, yCurr); ctx.lineTo(w, yCurr); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ffffaa';
    ctx.fillRect(8, yCurr-12, 8, 8);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(`Price ${fmt(priceNow,2)}`, 22, yCurr - 2);
  }

  // compute and draw SL/TP based on fib/projection
  if (projTargets) {
    const { isUptrend, stopLoss, tp1, tp2, tp3 } = projTargets;
    const colorTP = '#ffdd99';
    if (tp1) {
      const y = getY(tp1);
      ctx.beginPath(); ctx.strokeStyle = colorTP; ctx.lineWidth = 1.2; ctx.setLineDash([4,6]);
      ctx.moveTo(40, y); ctx.lineTo(w - 20, y); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = colorTP; ctx.fillText(`TP1 ${fmt(tp1,2)}`, 46, y - 6);
    }
    if (tp2) {
      const y = getY(tp2);
      ctx.beginPath(); ctx.strokeStyle = colorTP; ctx.lineWidth = 1.2; ctx.setLineDash([2,4]);
      ctx.moveTo(40, y); ctx.lineTo(w - 20, y); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = colorTP; ctx.fillText(`TP2 ${fmt(tp2,2)}`, 46, y - 6);
    }
    if (tp3) {
      const y = getY(tp3);
      ctx.beginPath(); ctx.strokeStyle = colorTP; ctx.lineWidth = 1.4;
      ctx.moveTo(40, y); ctx.lineTo(w - 20, y); ctx.stroke();
      ctx.fillStyle = colorTP; ctx.fillText(`TP3 ${fmt(tp3,2)}`, 46, y - 6);
    }
    if (stopLoss) {
      const y = getY(stopLoss);
      ctx.beginPath(); ctx.strokeStyle = '#ff5e7e'; ctx.lineWidth = 1.2; ctx.setLineDash([3,5]);
      ctx.moveTo(40, y); ctx.lineTo(w - 20, y); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = '#ff5e7e'; ctx.fillText(`SL ${fmt(stopLoss,2)}`, w - 160, y - 6);
    }
    // projection arrow + label
    if (projTargets.target1272) {
      const lastX = getX(visible.length - 1);
      const tx = lastX + 80;
      const ty = getY(projTargets.target1272);
      ctx.beginPath(); ctx.strokeStyle = '#ffdd99'; ctx.setLineDash([6,4]); ctx.moveTo(lastX + 10, getY(visible[visible.length-1].c)); ctx.lineTo(tx, ty); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ffdd99'; ctx.fillText(`Proj ${fmt(projTargets.target1272,2)}`, tx + 6, ty + 4);
    }
  }

  ctx.restore();
}

// main draw
function draw() {
  if (!ctx) return;
  const w = canvas.width / deviceDPR;
  const h = canvas.height / deviceDPR;
  ctx.clearRect(0,0,w,h);

  drawGrid(ctx, w, h);

  // decide visible candles count by width
  const visibleCount = Math.min(240, Math.max(40, Math.floor(w / 6)));
  const meta = drawCandles(ctx, candles, Math.max(0, candles.length - visibleCount), visibleCount, w, h);
  if (meta) {
    // detect swing using full candles array (so swing idx refers to global candles)
    const swing = detectSwing(candles);
    // compute fibs
    let fibs = null, projTargets = null;
    if (swing && swing.high && swing.low) {
      const isUptrend = swing.high.idx > swing.low.idx;
      fibs = computeFibLevels(swing.high.price, swing.low.price, isUptrend);
      const diff = Math.abs(swing.high.price - swing.low.price);
      const fibExt = diff * 0.618;
      const target1 = isUptrend ? swing.high.price + fibExt : swing.low.price - fibExt;
      const target1272 = isUptrend ? swing.high.price + fibExt * 1.272 : swing.low.price - fibExt * 1.272;
      const entry = priceNow;
      const stopLoss = isUptrend ? swing.low.price - diff * 0.15 : swing.high.price + diff * 0.15;
      const tp1 = fibs.find(f=>Math.abs(f.r - 0.5) < 0.001)?.price || (isUptrend ? swing.high.price - diff*0.5 : swing.low.price + diff*0.5);
      const tp2 = fibs.find(f=>Math.abs(f.r - 0.786) < 0.01)?.price || (isUptrend ? swing.high.price - diff*0.786 : swing.low.price + diff*0.786);
      const tp3 = target1272;
      projTargets = { isUptrend, target1, target1272, stopLoss, tp1, tp2, tp3 };
    }
    drawAnnotations(ctx, Object.assign(meta, { swing, fibs, projTargets }), w, h);
  }

  // small header overlay inside canvas (price & symbol)
  ctx.save();
  ctx.font = '14px Inter, monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.fillText(`${symbol} ${fmt(priceNow,2)}`, 14, 22);
  ctx.fillStyle = 'rgba(200,220,255,0.6)';
  ctx.fillText(`${timeframe>=1440?'D1':(timeframe>=240?'H4':(timeframe>=60?('H'+(timeframe/60)):('M'+timeframe)))}`, 140, 22);
  ctx.restore();
}

// ========== REFRESH / LOAD LOGIC ==========
async function loadDataAndRender(force=false) {
  overlayNote.style.display = 'block';
  overlayNote.innerText = 'LOADING…';
  try {
    if (symbol === 'BTCUSD') {
      // fetch klines from Binance for chosen interval
      const interval = BINANCE_INTERVALS[timeframe] || BINANCE_INTERVALS[15];
      try {
        const kl = await fetchBTCklines(interval, 500);
        candles = kl.map(k => ({ t: k.t, o: k.o, h: k.h, l: k.l, c: k.c, v: k.v }));
        // set priceNow to latest close
        priceNow = candles[candles.length - 1].c;
        usingLiveXAU = false;
        usingLiveHistory = true;
        liveState.innerText = '(live via Binance)';
      } catch (e) {
        console.error('Binance fetch failed:', e);
        // fallback: synthetic around previous priceNow
        candles = buildSyntheticCandles(priceNow || 30000, timeframe, 300);
        usingLiveHistory = false;
        liveState.innerText = '(synthetic)';
      }
    } else {
      // XAUUSD
      const xcur = await fetchXAUcurrent();
      if (xcur && typeof xcur.price === 'number') {
        priceNow = xcur.price;
        usingLiveXAU = true;
        liveState.innerText = `(live ${xcur.source})`;
      } else {
        // keep previous priceNow or default
        if (!priceNow || !isFinite(priceNow)) priceNow = 2336.80; // default
        usingLiveXAU = false;
        liveState.innerText = '(simulated)';
      }

      // try to fetch a historical source for XAU (daily)
      const dailyHistory = await fetchXAUhistoryDaily(365);
      if (dailyHistory && dailyHistory.length > 10 && timeframe >= 60) {
        // If timeframe is >= hourly/daily, we can use daily data and aggregate as needed
        // For TF D1/H4/H1 we can create candles by repeating daily bars or interpolating
        // We'll use dailyHistory for D1; for lower TF we'll synthesize intraday bars anchored to daily points
        if (timeframe >= 1440) {
          candles = dailyHistory.slice(-400);
          usingLiveHistory = true;
          liveState.innerText = `(live daily)`;
        } else {
          // build synthetic intraday candles anchored to daily closes (simple interpolation)
          const barsPerDay = Math.max(1, Math.floor(1440 / timeframe));
          const out = [];
          for (let i = Math.max(0, dailyHistory.length - 120); i < dailyHistory.length; i++) {
            const d = dailyHistory[i];
            // produce barsPerDay bars between this day and next (or small random if none)
            let base = d.c || d.o;
            for (let b=0;b<barsPerDay;b++) {
              const t = d.t + b * timeframe * 60000;
              const change = (Math.random() - 0.5) * (base * 0.002);
              const o = base; const c = Math.max(0.0001, base + change);
              const h = Math.max(o, c) * (1 + Math.random()*0.001);
              const l = Math.min(o, c) * (1 - Math.random()*0.001);
              out.push({ t, o, h, l, c, v: 1000 + Math.random()*8000 });
            }
          }
          candles = out.slice(-400);
          usingLiveHistory = true;
          liveState.innerText = `(live daily→intraday)`;
        }
      } else {
        // no useful history; create synthetic candles anchored to current price
        candles = buildSyntheticCandles(priceNow || 2336.80, timeframe, 400);
        usingLiveHistory = false;
        if (usingLiveXAU) liveState.innerText = `(live price; synthetic history)`;
      }
    }

    // update UI labels
    statusPrice.innerText = fmt(priceNow,2);
    statusTF.innerText = timeframe >= 1440 ? 'D1' : (timeframe >= 240 ? 'H4' : (timeframe >= 60 ? 'H'+(timeframe/60) : 'M'+timeframe));
    statusSymbol.innerText = symbol;

    // final draw
    resizeCanvas();
  } catch (err) {
    console.error('loadDataAndRender error', err);
    overlayNote.innerText = 'Error loading data';
  } finally {
    overlayNote.style.display = 'none';
  }
}

// ========== UI Handlers ==========
btnSymXAU.addEventListener('click', async () => {
  symbol = 'XAUUSD';
  btnSymXAU.classList.add('active'); btnSymBTC.classList.remove('active');
  await loadDataAndRender(true);
});
btnSymBTC.addEventListener('click', async () => {
  symbol = 'BTCUSD';
  btnSymBTC.classList.add('active'); btnSymXAU.classList.remove('active');
  await loadDataAndRender(true);
});
tfButtons.forEach(btn => {
  btn.addEventListener('click', async () => {
    tfButtons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    timeframe = parseInt(btn.dataset.tf,10);
    await loadDataAndRender(true);
  });
});
refreshBtn.addEventListener('click', async () => {
  await loadDataAndRender(true);
});

// initial load
(async () => {
  overlayNote.style.display = 'block';
  overlayNote.innerText = 'INITIALIZING…';
  // initial symbol/timeframe values set above
  await loadDataAndRender();
  // set periodic refresh: smaller interval for short TFs
  setInterval(async () => {
    await loadDataAndRender();
  }, 7000); // every 7s attempt refresh; the fetch functions are robust and will fallback if blocked
  overlayNote.style.display = 'none';
})();

// redraw loop to keep current price marker moving slightly if synthetic
setInterval(() => {
  // if synthetic XAU history, nudge price slightly to show live feel
  if (symbol === 'XAUUSD' && !usingLiveXAU) {
    // small random walk around current price
    priceNow = Math.max(0.0001, priceNow + (Math.random()-0.5) * priceNow * 0.0004);
    statusPrice.innerText = fmt(priceNow,2);
  } else if (symbol === 'BTCUSD' && !usingLiveHistory) {
    // small nudge
    priceNow = Math.max(0.0001, priceNow + (Math.random()-0.5) * priceNow * 0.0006);
    statusPrice.innerText = fmt(priceNow,2);
  }
  draw();
}, 1500);

// initial canvas size
resizeCanvas();
</script>
