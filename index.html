<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI CHART SIGNAL OVERLAY</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{background:#000;color:#fff;font-family:Arial;padding:10px;}
.card{background:#0a0a0a;border:1px solid #222;padding:12px;margin-bottom:10px;border-radius:12px;}

#chartContainer{
 position:relative;
 width:100%;
 height:350px;
}

#tvchart{
 width:100%;
 height:100%;
}

.overlay{
 position:absolute;
 left:0;
 top:0;
 width:100%;
 height:100%;
 pointer-events:none;
}

.signal-arrow{
 position:absolute;
 font-size:24px;
 font-weight:bold;
}

.buy{ color:#00ff88; }
.sell{ color:#ff4444; }

.line{
 position:absolute;
 width:100%;
 height:1px;
}

.entry{ background:#00ff88; }
.sl{ background:#ff4444; }
.tp{ background:#ffaa00; }

</style>
</head>

<body>

<div class="card">
<div id="chartContainer">
<div id="tvchart"></div>

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

</div>
</div>

<script>

let price=0,history=[];
let symbol="BINANCE:BTCUSDT";

function loadChart(){
 document.getElementById("tvchart").innerHTML="";
 new TradingView.widget({
  container_id:"tvchart",
  width:"100%",
  height:350,
  symbol:symbol,
  interval:"15",
  theme:"dark"
 });
}

async function fetchPrice(){
 let r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
 let d=await r.json();
 price=parseFloat(d.price);

 history.push(price);
 if(history.length>100) history.shift();

 runAI();
}

function EMA(p){
 let k=2/(p+1),ema=history[0];
 for(let i=1;i<history.length;i++) ema=history[i]*k+ema*(1-k);
 return ema;
}

function runAI(){

 if(history.length<50) return;

 let ema50=EMA(50);
 let ema200=EMA(200);

 let signal="WAIT";

 if(price>ema50 && ema50>ema200){
  signal="BUY";
 }else if(price<ema50 && ema50<ema200){
  signal="SELL";
 }

 drawOverlay(signal);
}

function drawOverlay(signal){

 let overlay=document.getElementById("overlay");
 overlay.innerHTML="";

 if(signal==="WAIT") return;

 // random vertical position (simulate real placement)
 let y = Math.random()*300 + 20;

 // arrow
 let arrow=document.createElement("div");
 arrow.className="signal-arrow "+(signal==="BUY"?"buy":"sell");
 arrow.style.left="10px";
 arrow.style.top=y+"px";
 arrow.innerText= signal==="BUY"?"▲":"▼";
 overlay.appendChild(arrow);

 // levels
 let entryY=y;
 let slY= signal==="BUY"?y+40:y-40;
 let tpY= signal==="BUY"?y-40:y+40;

 overlay.appendChild(createLine(entryY,"entry"));
 overlay.appendChild(createLine(slY,"sl"));
 overlay.appendChild(createLine(tpY,"tp"));
}

function createLine(y,type){
 let line=document.createElement("div");
 line.className="line "+type;
 line.style.top=y+"px";
 return line;
}

setInterval(fetchPrice,5000);
loadChart();

</script>

</body>
</html>
