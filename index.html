<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>F609 TRADING</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #0a0a0f;
        font-family: -apple-system, 'Courier New', monospace;
        padding: 20px;
        color: #00ffcc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .container {
        max-width: 400px;
        text-align: center;
    }
    .icon {
        font-size: 64px;
        margin-bottom: 24px;
    }
    h1 {
        font-size: 28px;
        background: linear-gradient(135deg, #00ffcc, #ffd700);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 16px;
    }
    .message-box {
        background: #111a24;
        border: 1px solid #00ffcc;
        border-radius: 24px;
        padding: 32px 24px;
        margin: 20px 0;
    }
    .message-title {
        font-size: 22px;
        font-weight: 800;
        color: #ffd700;
        margin-bottom: 16px;
    }
    .message-text {
        font-size: 14px;
        color: #8a9bb0;
        line-height: 1.6;
    }
    .user-card {
        background: #111a24;
        border-radius: 20px;
        padding: 12px 16px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #00ffcc20;
    }
    .avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00ffcc, #ffd700);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
    }
    .user-name {
        font-weight: 800;
        font-size: 16px;
    }
    .user-id {
        font-size: 10px;
        color: #8a9bb0;
    }
    .footer {
        font-size: 9px;
        color: #8a9bb0;
        margin-top: 24px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="icon">⚡</div>
    <h1>F609 TRADING</h1>

    <div class="user-card" id="userCard">
        <div class="avatar" id="userAvatar">👤</div>
        <div class="user-info">
            <div class="user-name" id="userName">Trader</div>
            <div class="user-id" id="userId">Loading...</div>
        </div>
    </div>

    <div class="message-box">
        <div class="message-title">🔧 UNDER MAINTENANCE</div>
        <div class="message-text">
            We are currently fixing and improving the bot.<br><br>
            Please check back soon.<br><br>
            Thank you for your patience. 🙏
        </div>
    </div>

    <div class="footer">
        ⚡ Update coming soon ⚡
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let user = tg.initDataUnsafe?.user;
    
    if (user) {
        document.getElementById("userName").innerHTML = user.first_name || "Trader";
        document.getElementById("userAvatar").innerHTML = user.first_name?.charAt(0).toUpperCase() || "👤";
        document.getElementById("userId").innerHTML = `@${user.username || 'user'}`;
    } else {
        document.getElementById("userId").innerHTML = "Demo Mode";
    }
</script>
</body>
</html>
